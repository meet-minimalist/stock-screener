universe: sp500
start_date: "2025-06-22"
end_date: "2026-06-22"
interval: "1d"
cache_dir: "data/yfinance_cache"

indicators:
  sma: [20, 50]
  rsi: [14]
  macd:
    fast: 12
    slow: 26
    signal: 9

strategies:
  oversold_bounce:
    conditions:
      - indicator: rsi_14
        operator: "<"
        value: 30
  golden_cross:
    conditions:
      - indicator: sma_20
        operator: ">"
        value_column: sma_50
